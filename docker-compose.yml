version: '3.8'

services:
  # Relational database service (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: universal-rag-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: universal_rag_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d universal_rag_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # In-memory caching and session service (Redis)
  redis:
    image: redis:7-alpine
    container_name: universal-rag-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend Application service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: universal-rag-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:root@db:5432/universal_rag_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_CACHE_TTL_SECONDS=3600
      - RATE_LIMIT_REQUESTS_PER_MINUTE=300
      - ESTIMATED_COST_PER_1K_TOKENS=0.015
    volumes:
      - uploads_data:/app/uploads
      - vector_db_data:/app/vector_db
      - hf_cache:/root/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  vector_db_data:
    driver: local
  hf_cache:
    driver: local
